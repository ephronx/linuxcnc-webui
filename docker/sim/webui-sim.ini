# ============================================================
# LinuxCNC simulator config for web UI development/testing.
# 3-axis XYZ mill, metric, no real hardware required.
# ============================================================

[EMC]
MACHINE = WebUI Sim
VERSION = 1.1

[DISPLAY]
# axis launches in Xvfb so the webui can connect alongside it
DISPLAY = axis
CYCLE_TIME = 0.0500
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 2.0
MAX_SPINDLE_OVERRIDE = 2.0
DEFAULT_LINEAR_VELOCITY = 25
MAX_LINEAR_VELOCITY = 50
DEFAULT_ANGULAR_VELOCITY = 25
MAX_ANGULAR_VELOCITY = 200
INCREMENTS = 1mm 0.1mm 0.01mm 0.001mm
PROGRAM_PREFIX = /root/linuxcnc/nc_files

[FILTER]
PROGRAM_EXTENSION = .ngc G-Code File
ngc = cat

[TASK]
TASK = milltask
CYCLE_TIME = 0.001

[RS274NGC]
PARAMETER_FILE = /root/linuxcnc/configs/webui-sim/webui-sim.var

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
BASE_PERIOD = 0
SERVO_PERIOD = 1000000

[HAL]
HALFILE = webui-sim.hal

[TRAJ]
COORDINATES = X Y Z
MAX_LINEAR_VELOCITY = 50
MAX_ANGULAR_VELOCITY = 300
MAX_LINEAR_ACCELERATION = 500
MAX_ANGULAR_ACCELERATION = 1200
DEFAULT_LINEAR_VELOCITY = 25
DEFAULT_ANGULAR_VELOCITY = 150
LINEAR_UNITS = mm
ANGULAR_UNITS = degree

[AXIS_X]
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = 0
MAX_LIMIT = 300
HOME = 0
HOME_SEQUENCE = 0

[AXIS_Y]
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = 0
MAX_LIMIT = 200
HOME = 0
HOME_SEQUENCE = 0

[AXIS_Z]
MAX_VELOCITY = 25
MAX_ACCELERATION = 250
MIN_LIMIT = -200
MAX_LIMIT = 0
HOME = 0
HOME_SEQUENCE = 0

[JOINT_0]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = 0
MAX_LIMIT = 300
HOME = 0
HOME_SEQUENCE = 0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_USE_INDEX = NO

[JOINT_1]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = 0
MAX_LIMIT = 200
HOME = 0
HOME_SEQUENCE = 0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_USE_INDEX = NO

[JOINT_2]
TYPE = LINEAR
MAX_VELOCITY = 25
MAX_ACCELERATION = 250
MIN_LIMIT = -200
MAX_LIMIT = 0
HOME = 0
HOME_SEQUENCE = 0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_USE_INDEX = NO

[SPINDLE_0]
MAX_FORWARD_VELOCITY = 6000
MIN_FORWARD_VELOCITY = 0
MAX_REVERSE_VELOCITY = 6000
MIN_REVERSE_VELOCITY = 0

[KINS]
KINEMATICS = trivkins coordinates=XYZ
JOINTS = 3
